<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/机器人.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta
      name="description"
      content="LHZ个人智能助手 - 基于AI的智能对话系统，支持联网搜索和知识库功能"
    />
    <meta name="keywords" content="AI聊天,智能助手,刘海柱,对话系统,人工智能" />
    <meta name="author" content="LiuHaizhu AI" />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta name="theme-color" content="#8b5cf6" />
    <title>LHZ个人智能助手</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      
      #app-loading.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      
      .loader-container {
        position: relative;
        width: 120px;
        height: 120px;
      }
      
      .loader-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 3px solid transparent;
        animation: rotate 1.5s linear infinite;
      }
      
      .loader-ring:nth-child(1) {
        border-top-color: #8b5cf6;
        animation-delay: 0s;
      }
      
      .loader-ring:nth-child(2) {
        width: 90%;
        height: 90%;
        top: 5%;
        left: 5%;
        border-right-color: #a78bfa;
        animation-delay: 0.15s;
        animation-direction: reverse;
      }
      
      .loader-ring:nth-child(3) {
        width: 80%;
        height: 80%;
        top: 10%;
        left: 10%;
        border-bottom-color: #c4b5fd;
        animation-delay: 0.3s;
      }
      
      .loader-core {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
        border-radius: 50%;
        animation: pulse 1.5s ease-in-out infinite;
        box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
      }
      
      .loader-text {
        margin-top: 30px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 16px;
        color: #e5e7eb;
        letter-spacing: 2px;
        animation: fadeInOut 2s ease-in-out infinite;
      }
      
      .loader-progress {
        margin-top: 20px;
        width: 200px;
        height: 3px;
        background: rgba(139, 92, 246, 0.2);
        border-radius: 3px;
        overflow: hidden;
      }
      
      .loader-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #8b5cf6 0%, #a78bfa 50%, #8b5cf6 100%);
        background-size: 200% 100%;
        animation: progress 2s ease-in-out infinite;
        border-radius: 3px;
      }
      
      @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { 
          transform: translate(-50%, -50%) scale(1);
          box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
        }
        50% { 
          transform: translate(-50%, -50%) scale(1.1);
          box-shadow: 0 0 50px rgba(139, 92, 246, 0.8);
        }
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      
      @keyframes progress {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      @media (prefers-reduced-motion: reduce) {
        .loader-ring,
        .loader-core,
        .loader-text,
        .loader-progress-bar {
          animation: none;
        }
        .loader-core {
          box-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="loader-container">
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-core"></div>
      </div>
      <div class="loader-text">LHZ AI LOADING</div>
      <div class="loader-progress">
        <div class="loader-progress-bar"></div>
      </div>
    </div>
    
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
